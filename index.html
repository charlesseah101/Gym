<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For The Smol White Seal</title>

<style>

}

h1{

<body>

<button onclick="showMessage()">Click Me</button>

<p id="message"></p>

<img id="sealpic" src="seal.jpg">

<script>
function showMessage(){
document.getElementById("message").innerHTML =
"ALSO PLEASE STAY SAFE AND DRINK LOADS OF WATER RAHHHH!";

}
</script>

</html>
